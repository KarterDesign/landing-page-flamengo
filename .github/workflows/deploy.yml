name: Deploy SFTP
on:
  push:
    branches:
      - main  # O deploy acontece quando você envia para a branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do GitHub
        uses: actions/checkout@v4

      - name: Enviar arquivos via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_HOST }}
          port: 22122
          password: ${{ secrets.SFTP_PASSWORD }} # Use 'ssh_private_key' se preferir chaves
          local_path: './*'        # O que será enviado (tudo na raiz)
          remote_path: '/srv/app576.3274303c.configr.cloud/www' # Pasta de destino no seu servidor
          sftp_only: true
          